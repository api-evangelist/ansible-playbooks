name: Ansible Playbooks
description: >-
  A curated collection of APIs, tools, and platforms for managing and executing
  Ansible playbooks for IT automation, configuration management, and
  orchestration. Covers the Ansible Automation Platform, AWX, Galaxy, Automation
  Hub, Runner, and Semaphore APIs that power modern infrastructure automation
  workflows.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/ansible-playbooks/refs/heads/main/apis.yml
created: "2024-01-15"
modified: "2026-04-19"
specificationVersion: '0.16'
tags:
  - Ansible
  - Automation
  - Configuration Management
  - DevOps
  - Infrastructure As Code
  - Orchestration
