  - type: Features
    data:
      - name: Playbook Execution via API
        description: >-
          Launch, monitor, and cancel Ansible playbook runs programmatically
          via REST API with support for extra vars, limits, and tags.
      - name: Inventory Management
        description: >-
          Create and manage dynamic and static inventories with groups,
          hosts, and host variables through the API.
      - name: Credential Storage
        description: >-
          Securely store SSH keys, cloud credentials, and vault passwords
          in encrypted credential objects accessible to jobs.
      - name: Workflow Templates
        description: >-
          Chain multiple job templates into orchestrated workflows with
          conditional success/failure branching.
      - name: Scheduling
        description: >-
          Schedule playbook runs on recurring schedules using rrule-based
          calendar expressions.
      - name: Collections and Role Management
        description: >-
          Discover, download, and manage Ansible collections and roles from
          Galaxy, Automation Hub, or private repositories.
  - type: UseCases
    data:
      - name: Infrastructure Provisioning
        description: >-
          Automate the provisioning of cloud resources, VMs, and
          bare-metal servers using Ansible playbooks triggered via API.
      - name: Configuration Management
        description: >-
          Enforce consistent configuration state across server fleets by
          scheduling and executing configuration playbooks via API.
      - name: CI/CD Pipeline Integration
        description: >-
          Trigger Ansible playbook runs as deployment steps within Jenkins,
          GitLab CI, GitHub Actions, and other CI/CD platforms.
      - name: Compliance and Remediation
        description: >-
          Run compliance playbooks on demand or on schedule to detect and
          remediate drift from desired security baseline states.
      - name: Network Automation
        description: >-
          Automate network device configuration, firmware upgrades, and
          compliance checks using Ansible network collections via the API.
  - type: Integrations
    data:
      - name: Red Hat OpenShift
        description: >-
          Deploy and configure OpenShift clusters and workloads using
          Ansible Automation Platform integrated with OpenShift pipelines.
      - name: ServiceNow
        description: >-
          Trigger Ansible job templates from ServiceNow ITSM workflows for
          automated ticket remediation and change management.
      - name: GitHub Actions
        description: >-
          Use the Ansible Automation Platform GitHub Action to trigger
          playbook runs as part of GitHub CI/CD workflows.
      - name: Terraform
        description: >-
          Combine Terraform for infrastructure provisioning with Ansible
          for post-provisioning configuration management.
      - name: Splunk
        description: >-
          Use Ansible collections to configure Splunk deployments and
          automate security alert remediation workflows.
